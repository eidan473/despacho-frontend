server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Necesario para React Router: redirige rutas al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso al backend: el frontend llama a /api/*
    # y nginx lo redirige a la IP privada del EC2 Backend
    location /api/ {
        proxy_pass http://BACKEND_PRIVATE_IP:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
